plugins {
  id("com.android.application")
  id("org.jetbrains.kotlin.android")
}

android {
  namespace "com.codexrelay.app"
  compileSdk 34

  defaultConfig {
    applicationId "com.codexrelay.app"
    minSdk 26
    targetSdk 34
    versionCode 2
    versionName "1.1"

    buildConfigField "String", "RELAY_BASE_URL", "\"https://relay.example.com/\""
